<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homework 2 Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Welcome - User Registration</h1>

<div class="container">

    <!-- FORM -->
    <form id="mainForm">

        <h2>Register</h2>

        <label>First Name</label>
        <input type="text" id="firstName">

        <label>Last Name</label>
        <input type="text" id="lastName">

        <label>Email</label>
        <input type="email" id="email">

        <label>Phone</label>
        <input type="text" id="phone">

        <h3>Address</h3>

        <label>Address 1</label>
        <input type="text" id="address1">

        <label>City</label>
        <input type="text" id="city">

        <label>State</label>
        <select id="state"></select>

        <label>Zip</label>
        <input type="text" id="zip">

        <h3>Budget</h3>

        <input type="range" id="budget" min="20000" max="200000" step="1000">
        <span id="budgetValue">$20,000</span>

        <h3>User ID</h3>

<input type="text" id="userId"
  placeholder="Enter User ID"
  title="5–30 chars, must start with letter, no spaces, only letters, numbers, _ or -"
  pattern="^[A-Za-z][A-Za-z0-9_-]{4,29}$"
  required>


<h2>Password</h2>

<input type="password" id="password"
  placeholder="Enter Password"
  required>

<input type="password" id="confirmPassword"
  placeholder="Re-enter Password"
  required>

    </form>

    <!-- REVIEW AREA (REQUIRED NEW DIV) -->
    <div id="reviewArea">
        <h2>Review Information</h2>
        <p>Click "Review" to display entered data.</p>
    </div>

</div>

<script src="states.js"></script>
<script src="script.js"></script>

</body>
</html>
