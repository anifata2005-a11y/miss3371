<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Registration - We Care Medical Clinic</title>

<style>
body {
    font-family: Arial;
}

#header, #footer {
    text-align: center;
    margin: 20px;
}

table {
    margin: auto;
}

.error {
    color: red;
    font-size: 12px;
    height: 15px;
}

input, select, textarea {
    padding: 5px;
}

button:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}
</style>

<script>
// DATE
function showDate() {
    const today = new Date();
    document.getElementById('currentDate').innerText =
        today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// SLIDER
function showSliderValue(val) {
    document.getElementById('sliderValue').innerText = val;
}

// NAME VALIDATION
function validateName(id, errorId) {
    let value = document.getElementById(id).value;
    let error = "";

    if (!/^[a-zA-Z\s']+$/.test(value)) {
        error = "Only letters allowed";
    }

    document.getElementById(errorId).innerText = error;
    return error === "";
}

// EMAIL VALIDATION
function validateEmail() {
    let emailField = document.getElementById("email");
    let email = emailField.value.toLowerCase();
    emailField.value = email;

    let error = "";

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        error = "Invalid email format";
    }

    document.getElementById("emailError").innerText = error;
    return error === "";
}

// PHONE VALIDATION
function validatePhone() {
    let phone = document.getElementById("phone").value;
    let error = "";

    if (phone && !/^\d{3}-\d{3}-\d{4}$/.test(phone)) {
        error = "Format: 123-456-7890";
    }

    document.getElementById("phoneError").innerText = error;
    return error === "";
}

// USER ID VALIDATION
function validateUserId() {
    let userId = document.getElementById("userId").value;
    let error = "";

    if (/^[0-9]/.test(userId)) {
        error = "Cannot start with number";
    } else if (userId.length < 5 || userId.length > 20) {
        error = "Must be 5-20 characters";
    } else if (!/^[a-zA-Z0-9_-]+$/.test(userId)) {
        error = "Only letters, numbers, - _ allowed";
    }

    document.getElementById("userIdError").innerText = error;
    return error === "";
}

// PASSWORD VALIDATION
function validatePassword() {
    let password = document.getElementById("password").value;
    let userId = document.getElementById("userId").value;
    let error = "";

    if (password.length < 8) {
        error = "At least 8 characters";
    } else if (!/[A-Z]/.test(password)) {
        error = "Need uppercase";
    } else if (!/[a-z]/.test(password)) {
        error = "Need lowercase";
    } else if (!/[0-9]/.test(password)) {
        error = "Need number";
    } else if (password === userId) {
        error = "Cannot match User ID";
    }

    document.getElementById("passwordError").innerText = error;
    return error === "";
}

// CONFIRM PASSWORD
function validateConfirmPassword() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;
    let error = "";

    if (pass !== confirm) {
        error = "Passwords do not match";
    }

    document.getElementById("confirmPasswordError").innerText = error;
    return error === "";
}

// MAIN VALIDATE
function validateForm() {
    let valid =
        validateUserId() &&
        validatePassword() &&
        validateConfirmPassword() &&
        validateName("firstName", "firstNameError") &&
        validateName("lastName", "lastNameError") &&
        validateEmail() &&
        validatePhone();

    document.getElementById("submitBtn").disabled = !valid;

    if (valid) {
        alert("All fields are valid! You can submit.");
    }
}
</script>
</head>

<body onload="showDate()">

<div id="header">
    <h1>We Care Medical Clinic</h1>
    <p>Today is: <span id="currentDate"></span></p>
</div>

<form action="thankyou.html">

<table>

<tr>
<td>First Name:</td>
<td>
<input type="text" id="firstName" oninput="validateName('firstName','firstNameError')" required>
<div class="error" id="firstNameError"></div>
</td>

<td>Last Name:</td>
<td>
<input type="text" id="lastName" oninput="validateName('lastName','lastNameError')" required>
<div class="error" id="lastNameError"></div>
</td>
</tr>

<tr>
<td>Email:</td>
<td>
<input type="email" id="email" oninput="validateEmail()" required>
<div class="error" id="emailError"></div>
</td>

<td>Phone:</td>
<td>
<input type="tel" id="phone" placeholder="123-456-7890" oninput="validatePhone()">
<div class="error" id="phoneError"></div>
</td>
</tr>

<tr>
<td>Health Rating:</td>
<td colspan="3">
<input type="range" min="1" max="10" value="5" oninput="showSliderValue(this.value)">
<span id="sliderValue">5</span>
</td>
</tr>

<!-- USER SECTION -->
<tr>
<td>User ID:</td>
<td>
<input type="text" id="userId" oninput="validateUserId()">
<div class="error" id="userIdError"></div>
</td>

<td>Password:</td>
<td>
<input type="password" id="password" oninput="validatePassword()">
<div class="error" id="passwordError"></div>
</td>
</tr>

<tr>
<td>Confirm Password:</td>
<td>
<input type="password" id="confirmPassword" oninput="validateConfirmPassword()">
<div class="error" id="confirmPasswordError"></div>
</td>
</tr>

<tr>
<td colspan="4" style="text-align:center;">
<input type="reset">

<button type="button" onclick="validateForm()">VALIDATE</button>

<button type="submit" id="submitBtn" disabled>Submit</button>
</td>
</tr>

</table>
</form>

<div id="footer">
<p>We Care Medical Clinic</p>
</div>

</body>
</html>
