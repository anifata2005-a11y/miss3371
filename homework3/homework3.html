<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>We Care Medical Clinic</title>

<link rel="stylesheet" href="style.css">

<script>
// DATE
function showDate() {
    const today = new Date();
    document.getElementById("currentDate").innerText =
        today.toDateString();
}

// SLIDER
function showSlider(val) {
    document.getElementById("sliderValue").innerText = val;
}

/* ---------------- VALIDATION ---------------- */

function validateName(id, errorId) {
    let value = document.getElementById(id).value;
    let error = document.getElementById(errorId);

    let regex = /^[A-Za-z'-]{1,30}$/;

    if (!regex.test(value)) {
        error.innerText = "Letters only (max 30)";
        return false;
    }

    error.innerText = "";
    return true;
}

function validateEmail() {
    let field = document.getElementById("email");
    let value = field.value.toLowerCase();
    field.value = value;

    let error = document.getElementById("emailError");

    let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!regex.test(value)) {
        error.innerText = "Invalid email";
        return false;
    }

    error.innerText = "";
    return true;
}

function validateUserId() {
    let value = document.getElementById("userId").value;
    let error = document.getElementById("userIdError");

    if (/^[0-9]/.test(value)) {
        error.innerText = "Cannot start with number";
        return false;
    }

    if (value.length < 5 || value.length > 20) {
        error.innerText = "5–20 characters required";
        return false;
    }

    if (!/^[A-Za-z0-9_-]+$/.test(value)) {
        error.innerText = "Only letters, numbers, - _ allowed";
        return false;
    }

    error.innerText = "";
    return true;
}

function validatePassword() {
    let pw = document.getElementById("password").value;
    let userId = document.getElementById("userId").value;
    let error = document.getElementById("passwordError");

    let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    if (!regex.test(pw)) {
        error.innerText = "Min 8 chars, upper, lower, number";
        return false;
    }

    if (pw === userId) {
        error.innerText = "Cannot match User ID";
        return false;
    }

    error.innerText = "";
    return true;
}

function validateConfirmPassword() {
    let pw = document.getElementById("password").value;
    let cpw = document.getElementById("confirmPassword").value;
    let error = document.getElementById("confirmError");

    if (pw !== cpw) {
        error.innerText = "Passwords do not match";
        return false;
    }

    error.innerText = "";
    return true;
}

/* MASTER CHECK */
function validateForm() {
    let ok =
        validateName("firstName", "firstNameError") &
        validateName("lastName", "lastNameError") &
        validateEmail() &
        validateUserId() &
        validatePassword() &
        validateConfirmPassword();

    document.getElementById("submitBtn").disabled = !ok;

    if (ok) alert("All good — you can submit!");
}
</script>

</head>

<body onload="showDate()">

<div id="header">
    <h1>We Care Medical Clinic</h1>
    <p>Today: <span id="currentDate"></span></p>
</div>

<form action="thankyou.html">

<table>

<tr>
<td>First Name:</td>
<td>
<input id="firstName" oninput="validateName('firstName','firstNameError')">
<div class="error" id="firstNameError"></div>
</td>

<td>Last Name:</td>
<td>
<input id="lastName" oninput="validateName('lastName','lastNameError')">
<div class="error" id="lastNameError"></div>
</td>
</tr>

<tr>
<td>Email:</td>
<td>
<input id="email" oninput="validateEmail()">
<div class="error" id="emailError"></div>
</td>
</tr>

<tr>
<td>User ID:</td>
<td>
<input id="userId" oninput="validateUserId()">
<div class="error" id="userIdError"></div>
</td>
</tr>

<tr>
<td>Password:</td>
<td>
<input type="password" id="password" oninput="validatePassword()">
<div class="error" id="passwordError"></div>
</td>

<td>Confirm:</td>
<td>
<input type="password" id="confirmPassword" oninput="validateConfirmPassword()">
<div class="error" id="confirmError"></div>
</td>
</tr>

<tr>
<td>Health:</td>
<td colspan="3">
<input type="range" min="1" max="10" value="5" oninput="showSlider(this.value)">
<span id="sliderValue">5</span>
</td>
</tr>

<tr>
<td colspan="4" style="text-align:center;">
<input type="reset">

<button type="button" onclick="validateForm()">VALIDATE</button>

<button id="submitBtn" type="submit" disabled>Submit</button>
</td>
</tr>

</table>

</form>

<div id="footer">
<p>We Care Medical Clinic</p>
</div>

</body>
</html>
